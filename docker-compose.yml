services:
  postgres:
    image: postgres:16-alpine
    container_name: hsf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hsf_wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-huangshifu_wiki}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U $${POSTGRES_USER:-hsf_wiki} -d $${POSTGRES_DB:-huangshifu_wiki}',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: hsf-qdrant
    profiles:
      - semantic
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    image: ${APP_IMAGE:-ghcr.io/huangshifu-wiki/huangshifu-wiki:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: hsf-app
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3003}
      UPLOADS_PATH: /app/uploads
      TRANSFORMERS_CACHE: /app/models/transformers
    ports:
      - '127.0.0.1:${APP_PORT:-3003}:${PORT:-3003}'
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - transformers_cache:/app/models/transformers
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:${PORT:-3003}/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
  qdrant_storage:
  transformers_cache:
