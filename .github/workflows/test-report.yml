name: Test Report

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: write
  checks: write

jobs:
  report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Display debug info
        run: |
          echo "Workflow Run ID: ${{ github.event.workflow_run.id }}"
          echo "Workflow Run Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Event Name: ${{ github.event_name }}"

      - name: Download unit test artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-unit
          path: coverage/unit
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download integration test artifacts
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: results/integration
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build-output
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: List downloaded files
        run: |
          echo "=== Coverage files ==="
          find coverage/ -type f 2>/dev/null || echo "No coverage files found"
          echo ""
          echo "=== Integration results ==="
          find results/ -type f 2>/dev/null || echo "No integration results found"
          echo ""
          echo "=== Build output ==="
          find build-output/ -type f 2>/dev/null || echo "No build output found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Test Summary Report
        id: summary
        run: |
          echo "## 📊 Test Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "coverage/unit/coverage-summary.json" ]; then
            node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/unit/coverage-summary.json', 'utf8'));
            const total = summary.total;
            
            console.log('| Metric | Coverage | Threshold | Status |');
            console.log('|--------|----------|-----------|--------|');
            const metrics = [
              ['Lines', total.lines.pct, 25],
              ['Statements', total.statements.pct, 25],
              ['Functions', total.functions.pct, 65],
              ['Branches', total.branches.pct, 70]
            ];
            
            for (const [name, actual, threshold] of metrics) {
              const status = actual >= threshold ? '✅' : '❌';
              console.log(\`| \${name} | \${actual.toFixed(1)}% | \${threshold}% | \${status} |\`);
            }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "| Metric | Coverage | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| *No data* | - | - | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "build-output" ]; then
            BUILD_SIZE=$(du -sh build-output 2>/dev/null | cut -f1)
            FILE_COUNT=$(find build-output -type f 2>/dev/null | wc -l)
            echo "- **Build Size**: ${BUILD_SIZE}" >> $GITHUB_STEP_SUMMARY
            echo "- **Files Count**: ${FILE_COUNT}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- *Build artifacts not available*" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR
        if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let commentBody = '## 🧪 CI Test Report\n\n';
            
            // Unit test coverage
            if (fs.existsSync('coverage/unit/coverage-summary.json')) {
              const coverageData = JSON.parse(fs.readFileSync('coverage/unit/coverage-summary.json', 'utf8'));
              const total = coverageData.total;
              
              commentBody += '### ✅ Unit Test Coverage\n\n';
              commentBody += '| Metric | Value | Threshold |\n|--------|-------|----------|\n';
              commentBody += `| Lines | ${total.lines.pct.toFixed(1)}% | ≥25% |\n`;
              commentBody += `| Statements | ${total.statements.pct.toFixed(1)}% | ≥25% |\n`;
              commentBody += `| Functions | ${total.functions.pct.toFixed(1)}% | ≥65% |\n`;
              commentBody += `| Branches | ${total.branches.pct.toFixed(1)}% | ≥70% |\n\n`;
              
              const allPassed = 
                total.lines.pct >= 25 &&
                total.statements.pct >= 25 &&
                total.functions.pct >= 65 &&
                total.branches.pct >= 70;
              
              commentBody += allPassed ? '**Status: ✅ All thresholds passed!**\n\n' : '**Status: ❌ Some thresholds not met**\n\n';
            }
            
            // Integration tests
            if (fs.existsSync('results/integration')) {
              commentBody += '### 🔗 Integration Tests\n\n';
              commentBody += '*Integration tests executed successfully.*\n\n';
            }
            
            // Build info
            if (fs.existsSync('build-output')) {
              commentBody += '### 📦 Build Artifacts\n\n';
              commentBody += '*Build completed successfully.*\n\n';
            }
            
            commentBody += '---\n';
            commentBody += `_Generated by [Test Report Workflow](.github/workflows/test-report.yml)_\n`;
            
            // Get PR number from workflow run
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: context.payload.workflow_run.head_branch
            });
            
            if (prs.length > 0) {
              const prNumber = prs[0].number;
              
              // Find existing comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              
              const existingComment = comments.find(comment => 
                comment.user.type === 'Bot' && 
                comment.body.includes('CI Test Report')
              );
              
              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: commentBody
                });
              }
            }

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-combined
          path: |
            coverage/
            results/
          retention-days: 30
          if-no-files-found: ignore
