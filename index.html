<!doctype html>
<html lang="cn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="format-detection" content="telephone=no" />

    <!-- 预连接到关键第三方域名，加速后续请求但不阻塞渲染 -->
    <link rel="dns-prefetch" href="https://gator.volces.com" />
    <link rel="dns-prefetch" href="https://analysis.chatglm.cn" />
    <link rel="dns-prefetch" href="https://kimi.moonshot.cn" />
    <link rel="dns-prefetch" href="https://webapi.amap.com" />
    <link rel="dns-prefetch" href="https://restapi.amap.com" />

    <!-- 预连接（不阻塞渲染） -->
    <link rel="preconnect" href="https://webapi.amap.com" crossorigin="anonymous" />
    <link rel="preconnect" href="https://restapi.amap.com" crossorigin="anonymous" />

    <link rel="manifest" href="/manifest.json" />

    <!--
      字体加载优化策略：
      1. 使用系统字体栈（system font stack），无需下载外部字体文件
      2. CSS 中已设置 font-display: swap，避免 FOIT（Flash of Invisible Text）
      3. 字体回退链：系统默认字体 → 中文字体 → 通用衬线/无衬线字体
      4. 如需添加自定义字体，请在此处添加 <link rel="preload" href="/fonts/font.woff2" as="font" type="font/woff2" crossorigin />
    -->

    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <title>黄诗扶wiki</title>

    <!-- SVG滤镜定义 -->
    <svg width="0" height="0" class="svg-defs-container">
      <defs>
        <filter id="glass-distortion">
          <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <!--
      第三方脚本延迟加载策略：
      1. 浏览器扩展脚本（如 Kimi、ChatGLM 扩展）无法直接控制
      2. 对于应用主动加载的第三方脚本，使用以下策略：
         - async/defer 属性避免阻塞解析
         - requestIdleCallback 延迟非关键脚本
         - 用户交互后再加载分析类脚本
    -->
    <script src="/third-party-loader.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <footer id="static-footer" class="static-fallback-footer">
      <a href="https://img.lhl.one" target="_blank" rel="nofollow noopener noreferrer" class="static-fallback-link">Image Hub</a>
      <a href="http://www.freecdn.vip/?zzwz" target="_blank" rel="nofollow noopener noreferrer" class="static-fallback-link static-fallback-link--ml">LHL's Images</a>
    </footer>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/static-fallback.js"></script>
  </body>
</html>
