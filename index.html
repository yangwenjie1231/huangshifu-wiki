<!doctype html>
<html lang="cn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFD700" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#FFD700" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <title>黄诗扶wiki</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <!-- SVG滤镜定义 -->
    <svg width="0" height="0" style="position:absolute;">
      <defs>
        <filter id="glass-distortion">
          <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  </head>
  <body>
    <div id="root"></div>
    <footer id="static-footer" style="display:none; background:#faf9f7; border-top:1px solid #eee; padding:12px; text-align:center; font-size:12px; color:#999;">
      <a href="https://img.lhl.one" target="_blank" rel="nofollow noopener noreferrer" style="color:#999; text-decoration:none; margin-right:16px;">Image Hub</a>
      <a href="http://www.freecdn.vip/?zzwz" target="_blank" rel="nofollow noopener noreferrer" style="color:#999; text-decoration:none;">LHL's Images</a>
    </footer>
    <script>
      document.getElementById('static-footer').style.display = 'block';
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
